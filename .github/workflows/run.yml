name: 戰情室龍蝦雷達

on:
  schedule:
    # 預設台灣時間每天早上 6:30 跑一次 (UTC 22:30)
    - cron: '30 22 * * *'
  workflow_dispatch: # 允許大俠隨時手動點擊 Run workflow

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      # 關鍵就在這行！我已經幫你把 yfinance 寫死在裡面了，絕不漏接！
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas yfinance

    - name: Run main.py
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      run: python main.py
