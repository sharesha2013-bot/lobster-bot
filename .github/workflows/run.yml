name: Unmerciful Lobster Daily Scan

on:
  workflow_dispatch:
  schedule:
    # 🎯 準時發射：台灣時間每天下午 5:30 自動執行
    - cron: '30 9 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install packages
      run: pip install requests pandas

    - name: Run main.py
      # 🔑 金庫授權：這一步最重要，否則程式拿不到 Token
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      run: python main.py
