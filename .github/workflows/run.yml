name: Unmerciful Lobster Daily Scan

on:
  schedule:
    # 每天台股收盤後（台北時間下午 5:00 執行）
    # 註：GitHub 使用國際標準時 UTC，17:00 台北時間等於 09:00 UTC
    - cron: '0 9 * * 1-5'
  workflow_dispatch: # 讓你的手機隨時可以手動按「立刻執行」

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        pip install requests pandas

    - name: Run Lobster Bot
      run: python main.py
