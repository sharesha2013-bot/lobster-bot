name: Unmerciful Lobster Daily Scan

on:
  workflow_dispatch:
  schedule:
    # 設定每天台灣時間下午 2:30 自動執行
    - cron: '30 6 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install packages
      run: pip install requests pandas

    - name: Run main.py
      # 👇 這裡就是遺漏的關鍵授權書！讓程式能拿到金庫鑰匙
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      run: python main.py
